<!DOCTYPE html>
<html>

<head>
    <title>Dashboard | MyFinanceApp</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="dashboard">

        <!-- Sidebar -->
        <div class="sidebar">
            <h2>MyFinance</h2>

            <a href="#">Dashboard</a>
            <a href="#">Transactions</a>
            <a href="#">Categories</a>
            <a href="login.html">Logout</a>
        </div>

        <!-- Main content -->
        <div class="main">

            <h1>Dashboard</h1>

            <!-- Cards -->
            <div class="cards">

                <div class="card">
                    <p>Total Balance</p>
                    <h2>$12,450</h2>
                </div>

                <div class="card">
                    <p>Income</p>
                    <h2>$5,200</h2>
                </div>

                <div class="card">
                    <p>Expenses</p>
                    <h2>$3,100</h2>
                </div>

            </div>

            <!-- Transactions -->
            <div class="transactions">

                <h3>Recent Transactions</h3>

                <div class="tx">
                    <span>Salary</span>
                    <span class="income">+ $2,000</span>
                </div>

                <div class="tx">
                    <span>Groceries</span>
                    <span class="expense">- $120</span>
                </div>

                <div class="tx">
                    <span>Transport</span>
                    <span class="expense">- $50</span>
                </div>

            </div>

        </div>

    </div>
    <script type="module" src="js/dashboard.js"></script>
</body>

</html>
